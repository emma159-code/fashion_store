{% extends 'store/base.html' %}

{% block title %}Login - Fashion Store Rwanda{% endblock %}

{% block extra_css %}
<style>
    .auth-page {
        min-height: calc(100vh - 300px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .auth-container {
        background: var(--white);
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 100%;
    }

    .auth-title {
        font-size: 2em;
        text-align: center;
        margin-bottom: 0.5rem;
        color: var(--primary);
    }

    .auth-subtitle {
        text-align: center;
        color: #999;
        margin-bottom: 2rem;
    }

    .auth-form {
        display: flex;
        flex-direction: column;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 1.5rem;
    }

    .form-group label {
        font-weight: bold;
        margin-bottom: 0.5rem;
        color: var(--primary);
    }

    .form-group input {
        padding: 0.8rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 1em;
        font-family: inherit;
    }

    .form-group input:focus {
        outline: none;
        border-color: var(--secondary);
        box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
    }

    .submit-btn {
        background-color: var(--secondary);
        color: var(--primary);
        border: none;
        padding: 0.8rem;
        border-radius: 4px;
        font-weight: bold;
        font-size: 1em;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 0.5rem;
    }

    .submit-btn:hover {
        background-color: #e8c547;
        transform: scale(1.02);
    }

    .auth-link {
        text-align: center;
        margin-top: 1.5rem;
        color: #666;
    }

    .auth-link a {
        color: var(--secondary);
        text-decoration: none;
        font-weight: bold;
    }

    .auth-link a:hover {
        text-decoration: underline;
    }

    .divider {
        text-align: center;
        margin: 1.5rem 0;
        color: #999;
    }

    .divider span {
        background: white;
        padding: 0 0.5rem;
    }

    .social-login {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
    }

    .social-btn {
        flex: 1;
        padding: 0.8rem;
        border: 1px solid var(--border);
        background: var(--light);
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.3s;
        font-weight: bold;
    }

    .social-btn:hover {
        background: #f0f0f0;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your account</p>

        <form method="post" class="auth-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="submit-btn">Login</button>

            <div class="auth-link">
                <p>Don't have an account? <a href="{% url 'register' %}">Create one</a></p>
            </div>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <div class="social-login">
            <button class="social-btn">Google</button>
            <button class="social-btn">Facebook</button>
        </div>
    </div>
</div>
{% endblock %}
